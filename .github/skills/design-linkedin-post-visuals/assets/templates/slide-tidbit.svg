<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <!-- Qnit carousel — TIDBIT / info template. Label + stat + context. -->
  <rect width="1080" height="1350" fill="#070656"/>

  <text x="90" y="150" font-family="Quicksand" font-weight="700" font-size="52" fill="#FFFFFF">Qnit<tspan fill="#21b4bb">.</tspan></text>

  <!-- Eyebrow label -->
  <text x="90" y="370" font-family="Quicksand" font-weight="700" font-size="34" fill="#3c91e6" letter-spacing="4">DID YOU KNOW</text>

  <!-- Big stat -->
  <text x="84" y="640" font-family="Quicksand" font-weight="700" font-size="210" fill="#ff7065">42%</text>

  <!-- Headline -->
  <text x="90" font-family="Quicksand" font-weight="700" font-size="56" fill="#FFFFFF">
    <tspan x="90" y="780">Headline for the</tspan>
    <tspan x="90" y="850">info tidbit.</tspan>
  </text>

  <!-- Context -->
  <text x="90" font-family="Quicksand" font-weight="500" font-size="40" fill="#FFFFFF" opacity="0.85">
    <tspan x="90" y="990">One or two lines of context that make</tspan>
    <tspan x="90" y="1044">the number meaningful.</tspan>
  </text>

  <text x="990" y="1240" text-anchor="end" font-family="Quicksand" font-weight="500" font-size="32" fill="#FFFFFF" opacity="0.6">03</text>
</svg>

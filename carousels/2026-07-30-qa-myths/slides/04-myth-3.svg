<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <rect width="1080" height="1350" fill="#05032e"/>
  <text x="90" y="150" font-family="Quicksand" font-weight="700" font-size="52" fill="#FFFFFF">Qnit<tspan fill="#21b4bb">.</tspan></text>

  <text x="90" y="300" font-family="Quicksand" font-weight="700" font-size="34" fill="#ff7065" letter-spacing="4">MYTH 3</text>
  <text x="78" y="470" font-family="Quicksand" font-weight="700" font-size="200" fill="#ff7065">&#8220;</text>

  <text x="90" font-family="Quicksand" font-weight="700" font-size="72" fill="#FFFFFF">
    <tspan x="90" y="530">Non-functional</tspan>
    <tspan x="90" y="616">testing slows</tspan>
    <tspan x="90" y="702">delivery down.</tspan>
  </text>

  <text x="90" y="900" font-family="Quicksand" font-weight="700" font-size="34" fill="#21b4bb" letter-spacing="4">REALITY</text>
  <text x="90" font-family="Quicksand" font-weight="500" font-size="40" fill="#FFFFFF">
    <tspan x="90" y="970">Catching a scalability issue in CI takes</tspan>
    <tspan x="90" y="1024">minutes. Catching it in production</tspan>
    <tspan x="90" y="1078">takes a weekend.</tspan>
  </text>

  <text x="990" y="1240" text-anchor="end" font-family="Quicksand" font-weight="500" font-size="32" fill="#FFFFFF" opacity="0.6">04 / 05</text>

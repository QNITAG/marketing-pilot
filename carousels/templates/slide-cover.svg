<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <!-- Qnit carousel — COVER template (1080x1350). Replace copy; keep the layout. -->
  <rect width="1080" height="1350" fill="#070656"/>

  <!-- Wordmark (placeholder for the Qnit logo; embed brand/assets logo when finalized) -->
  <text x="90" y="150" font-family="Quicksand" font-weight="700" font-size="52" fill="#FFFFFF">Qnit<tspan fill="#21b4bb">.</tspan></text>

  <!-- Accent bar -->
  <rect x="90" y="300" width="120" height="14" rx="7" fill="#ff7065"/>

  <!-- Headline -->
  <text x="90" font-family="Quicksand" font-weight="700" font-size="96" fill="#FFFFFF">
    <tspan x="90" y="420">Headline that</tspan>
    <tspan x="90" y="530">hooks in three</tspan>
    <tspan x="90" y="640">seconds</tspan>
  </text>

  <!-- Subhead -->
  <text x="90" font-family="Quicksand" font-weight="500" font-size="40" fill="#21b4bb">
    <tspan x="90" y="800">A short supporting line that sets up</tspan>
    <tspan x="90" y="854">the value of this carousel.</tspan>
  </text>

  <!-- Swipe affordance (arrow drawn as vector so it never depends on font glyphs) -->
  <text x="90" y="1235" font-family="Quicksand" font-weight="700" font-size="40" fill="#ff7065">Swipe</text>
  <path d="M250 1221 H300 M300 1221 L282 1205 M300 1221 L282 1237" fill="none" stroke="#ff7065" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Slide progress dots -->
  <circle cx="880" cy="1222" r="9" fill="#FFFFFF"/>
  <circle cx="915" cy="1222" r="9" fill="#FFFFFF" opacity="0.35"/>
  <circle cx="950" cy="1222" r="9" fill="#FFFFFF" opacity="0.35"/>
  <circle cx="985" cy="1222" r="9" fill="#FFFFFF" opacity="0.35"/>
</svg>

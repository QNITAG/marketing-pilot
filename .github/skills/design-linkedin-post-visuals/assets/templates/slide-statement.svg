<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <!-- Qnit carousel — STATEMENT template. A bold claim + the reality. -->
  <rect width="1080" height="1350" fill="#05032e"/>

  <text x="90" y="150" font-family="Quicksand" font-weight="700" font-size="52" fill="#FFFFFF">Qnit<tspan fill="#21b4bb">.</tspan></text>

  <!-- Oversized quote mark accent -->
  <text x="78" y="440" font-family="Quicksand" font-weight="700" font-size="240" fill="#ff7065">&#8220;</text>

  <!-- Statement -->
  <text x="90" font-family="Quicksand" font-weight="700" font-size="76" fill="#FFFFFF">
    <tspan x="90" y="500">A bold statement</tspan>
    <tspan x="90" y="590">that challenges an</tspan>
    <tspan x="90" y="680">assumption.</tspan>
  </text>

  <!-- Reality -->
  <text x="90" y="930" font-family="Quicksand" font-weight="700" font-size="34" fill="#21b4bb" letter-spacing="4">REALITY</text>
  <text x="90" font-family="Quicksand" font-weight="500" font-size="40" fill="#FFFFFF">
    <tspan x="90" y="1000">Explain what is actually true in one or</tspan>
    <tspan x="90" y="1054">two supporting lines.</tspan>
  </text>

  <!-- Slide number -->
  <text x="990" y="1240" text-anchor="end" font-family="Quicksand" font-weight="500" font-size="32" fill="#FFFFFF" opacity="0.6">02</text>
</svg>
